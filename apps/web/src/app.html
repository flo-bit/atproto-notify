<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="color-scheme" content="light dark" />

		<!-- PWA install -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf9" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#191917" />
		<link rel="apple-touch-icon" href="/icon.svg" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="atmo.pub" />

		<!-- Apply the saved theme before paint to avoid a flash of the wrong theme.
		     When unset ('system'), CSS falls back to prefers-color-scheme. -->
		<script>
			try {
				const t = localStorage.getItem('theme');
				if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
			} catch (e) {
				/* ignore */
			}
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
