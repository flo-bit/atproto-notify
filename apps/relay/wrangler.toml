name = "notifs-relay"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom domains bind the whole hostname (no path/wildcard); the Worker's own
# router dispatches paths internally.
routes = [{ pattern = "relay.atmo.pub", custom_domain = true }]

[[d1_databases]]
binding = "DB"
database_name = "notifs-relay"
database_id = "53f56b8c-d25e-468a-9d02-e8575bf8964f"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "8b1baa80a28c468c83da20f3f6dec3b6"

[[queues.producers]]
# `binding` is the code-side name (env.DISPATCH_QUEUE); `queue` is the real
# Cloudflare queue you created (`notifs-dispatch`). The binding name is arbitrary.
binding = "DISPATCH_QUEUE"
queue = "notifs-dispatch"

[[queues.consumers]]
queue = "notifs-dispatch"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[triggers]
crons = ["0 3 * * *"]

[observability]
enabled = true

[vars]
RELAY_DID = "did:web:relay.atmo.pub"
BOT_USERNAME = "atmo_notify_bot"        # e.g. "atmonotifsbot"
# Web push (VAPID). Generate with `pnpm vapid:keygen`. The public key is also the
# browser applicationServerKey — paste the SAME value into apps/web VAPID_PUBLIC_KEY.
VAPID_PUBLIC_KEY = "BF4pVUiFeh9wltn6Rj151RHA4WfidcRRv8kXp2aKcRATi_2gUgq0uGX8jVY1EczXqOvRtluqIxRj6Mtf5d1ImRw"
VAPID_SUBJECT = "https://atmo.pub"
# Email via comail (https://comail.at). COMAIL_DID = the account DID for the
# X-Atmos-DID header; COMAIL_FROM = an enrolled sender address — a BARE address,
# no "Name <addr>" display name (comail rejects that; the relay strips it anyway).
COMAIL_DID = "did:plc:jf3acz4zktzkaptswh5so43u"
COMAIL_FROM = "notify@atmo.pub"
# Daily email caps (rolling 24h). Per-recipient = anti-spam/cost; global = keep
# under the comail plan. Omit to use the defaults (10 / 100). See delivery/limits.ts.
EMAIL_DAILY_PER_RECIPIENT = "10"
EMAIL_DAILY_GLOBAL = "10"
# Bluesky DM via a bot account. BLUESKY_DM_IDENTIFIER = the bot's handle or DID;
# its PDS is resolved at runtime (login + chat both use it), so there's no service
# endpoint to set. The app password is the BLUESKY_DM_APP_PASSWORD secret.
BLUESKY_DM_IDENTIFIER = "did:plc:jf3acz4zktzkaptswh5so43u"

# Secrets set via `wrangler secret put`:
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_WEBHOOK_SECRET
# - VAPID_PRIVATE_JWK        (the private JWK from `pnpm vapid:keygen`)
# - RELAY_PRIVATE_KEY        (the private multikey from `pnpm relay:keygen`)
# - COMAIL_API_KEY           (atmos_… from comail.at)
# - BLUESKY_DM_APP_PASSWORD  (an app password from the bot's Bluesky account)
